<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      position: absolute;
      text-align: center;
      padding: 2.5rem 3.5rem;
      background: #1a1a24;
      border: 1px solid #2e2e40;
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
      will-change: transform;
    }

    .greeting {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #6b7280;
      letter-spacing: 0.05em;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #34d399;
      border-radius: 50%;
      margin-right: 0.45rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.75); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1 class="greeting" id="greeting">Hello, World!</h1>
    <p class="subtitle"><span class="dot"></span>Running on GitHub Pages</p>
  </div>

  <script>
    const palettes = [
      ['#a78bfa', '#60a5fa'],
      ['#f472b6', '#fb923c'],
      ['#34d399', '#60a5fa'],
      ['#fbbf24', '#f472b6'],
      ['#60a5fa', '#34d399'],
      ['#c084fc', '#f472b6'],
      ['#fb923c', '#fbbf24'],
      ['#38bdf8', '#a78bfa'],
    ];

    const card = document.getElementById('card');
    const greeting = document.getElementById('greeting');

    let paletteIdx = 0;
    function applyPalette(idx) {
      const [c1, c2] = palettes[idx];
      greeting.style.backgroundImage = `linear-gradient(135deg, ${c1}, ${c2})`;
      card.style.boxShadow = `0 16px 48px ${c1}22`;
      card.style.borderColor = `${c1}44`;
    }
    applyPalette(0);

    // wait for layout so we can measure card size
    requestAnimationFrame(() => requestAnimationFrame(() => {
      const cardW = card.offsetWidth;
      const cardH = card.offsetHeight;

      // Cache viewport size — do NOT read window.innerHeight every frame.
      // On iOS Safari the toolbar causes innerHeight to fluctuate mid-animation,
      // making the card appear "out of bounds" and triggering spurious color changes.
      let vpW = window.innerWidth;
      let vpH = window.innerHeight;
      window.addEventListener('resize', () => {
        vpW = window.innerWidth;
        vpH = window.innerHeight;
        x = Math.max(0, Math.min(x, vpW - cardW));
        y = Math.max(0, Math.min(y, vpH - cardH));
      });

      const SPEED = 0.6; // px per frame ~36px/s at 60fps
      let x = Math.random() * Math.max(0, vpW - cardW);
      let y = Math.random() * Math.max(0, vpH - cardH);
      let dx = SPEED * (Math.random() < 0.5 ? 1 : -1);
      let dy = SPEED * (Math.random() < 0.5 ? 1 : -1);

      function bounce() {
        const maxX = vpW - cardW;
        const maxY = vpH - cardH;
        let bounced = false;

        x += dx;
        y += dy;

        if (x <= 0)      { x = 0;    dx = Math.abs(dx);  bounced = true; }
        if (x >= maxX)   { x = maxX; dx = -Math.abs(dx); bounced = true; }
        if (y <= 0)      { y = 0;    dy = Math.abs(dy);  bounced = true; }
        if (y >= maxY)   { y = maxY; dy = -Math.abs(dy); bounced = true; }

        if (bounced) {
          paletteIdx = (paletteIdx + 1) % palettes.length;
          applyPalette(paletteIdx);
        }

        card.style.transform = `translate(${x}px, ${y}px)`;
        requestAnimationFrame(bounce);
      }

      requestAnimationFrame(bounce);
    }));
  </script>
</body>
</html>
